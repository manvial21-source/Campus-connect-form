<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus-connect-form</title>
</head>
<body>

    <header>
        <h1 style="text-align: center;">Campus-Connect Form</h1>
        <hr>
        <p>Please fill out the form below to register.</p>
        <hr>
    </header>

    <main>
        <form>
            <!-- Personal Information -->
            <fieldset>
                <legend>Personal Information</legend>

                <label for="first-name">First Name:</label>
                <input type="text" name="first_name" id="first-name">
                <br><br>

                <label for="last-name">Last Name:</label>
                <input type="text" name="last_name" id="last-name">
                <br><br>

                <label for="dob">Date of Birth:</label>
                <input type="date" name="dob" id="dob">
                <br><br>

                <label>Gender:</label>
                <input type="radio" name="gender" value="male" id="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" value="female" id="female">
                <label for="female">Female</label>
                <input type="radio" name="gender" value="other" id="other">
                <label for="other">Other</label>
                <br><br>

                <label for="email">Email:</label>
                <input type="email" name="email" id="email">
                <br><br>

                <label for="phone">Phone:</label>
                <input type="tel" name="phone" id="phone">
                <br><br>
            </fieldset>
            <hr>

            <!-- Address Information -->
            <fieldset>
                <legend>Address Information</legend>

                <label for="address">Address:</label><br>
                <textarea id="address" name="address" rows="4" cols="50"></textarea>
                <br><br>

                <label for="city">City:</label>
                <input type="text" name="city" id="city">
                <br><br>

                <label for="state">State:</label>
                <input type="text" name="state" id="state">
                <br><br>

                <label for="zip-code">ZIP Code:</label>
                <input type="text" name="zip_code" id="zip-code">
                <br><br>
            </fieldset>
            <hr>

            <!-- Educational Information -->
            <fieldset>
                <legend>Educational Information</legend>

                <label for="high-school">High School:</label>
                <input type="text" name="high_school" id="high-school">
                <br><br>

                <label for="gpa">GPA:</label>
                <input type="number" step="0.01" name="gpa" id="gpa">
                <br><br>

                <label for="major">Intended Major:</label>
                <input type="text" name="major" id="major">
                <br><br>

                <label for="grad-year">Year of Graduation:</label>
                <input type="number" name="grad_year" id="grad-year">
                <br><br>
            </fieldset>
            <hr>

            <!-- Additional Information -->
            <fieldset>
                <legend>Additional Information</legend>

                <label for="hobbies">Interests and Hobbies:</label><br>
                <textarea id="hobbies" name="hobbies" rows="4" cols="50"></textarea>
                <br><br>

                <label for="comments">Additional Comments:</label><br>
                <textarea id="comments" name="comments" rows="4" cols="50"></textarea>
                <br><br>
            </fieldset>
            <hr>

            <input type="submit" value="Register">
            <hr>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Student Registration. All rights reserved.</p>
    </footer>

</body>
</html>
